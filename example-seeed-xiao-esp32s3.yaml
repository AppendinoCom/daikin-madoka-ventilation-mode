# ─── Madoka BLE Bridge — Seeed XIAO ESP32-S3 ───────────────
#
# ESPHome firmware for Seeed XIAO ESP32-S3 that connects to
# Daikin Madoka BRC1H via BLE and exposes ventilation control
# + sensors to Home Assistant.
#
# Usage:
#   1. Copy this file to your ESPHome config directory
#   2. Set your secrets in secrets.yaml (see below)
#   3. Flash: esphome run madoka-bridge-xiao.yaml
#
# Required secrets.yaml entries:
#   wifi_ssid: "YourWiFi"
#   wifi_password: "YourPassword"
#   api_encryption_key: "your-base64-key"   # generate with: esphome wizard
#   ota_password: "your-ota-password"
#   ap_password: "your-fallback-ap-password"
#   madoka_mac: "AA:BB:CC:DD:EE:FF"         # your BRC1H MAC address
# ────────────────────────────────────────────────────────────

esphome:
  name: madoka-bridge-xiao
  friendly_name: "Madoka BLE Bridge (XIAO S3)"

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      # Enable BLE
      CONFIG_BT_ENABLED: "y"
      CONFIG_BT_BLE_ENABLED: "y"
      CONFIG_BT_BLUEDROID_ENABLED: "y"
      CONFIG_BT_BLE_SMP_ENABLE: "y"
      # Enable LE Secure Connections
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: "y"
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: "y"
      # NVS for bond storage
      CONFIG_BT_BLE_STORE_BONDED_DEVICES: "y"

# Load component from GitHub
external_components:
  - source:
      type: git
      url: https://github.com/AppendinoCom/daikin-madoka-ventilation-mode
      ref: main
    components: [madoka_ble]

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Madoka-Bridge-Fallback"
    password: !secret ap_password

captive_portal:

# ─── Madoka BLE Component ───────────────────────────────────
madoka_ble:
  mac_address: !secret madoka_mac
  poll_interval: 60s

# ─── Sensors ────────────────────────────────────────────────
sensor:
  - platform: madoka_ble
    indoor_temperature:
      name: "Indoor Temperature"
    outdoor_temperature:
      name: "Outdoor Temperature"
    cooling_setpoint:
      name: "Cooling Setpoint"
    heating_setpoint:
      name: "Heating Setpoint"

# ─── Binary Sensors ─────────────────────────────────────────
binary_sensor:
  - platform: madoka_ble
    filter_alert:
      name: "Filter Alert"

# ─── Fan (ventilation on/off + low/high) ──────────────────
fan:
  - platform: madoka_ble
    name: "Rekuperacia"

# ─── Text Sensors ───────────────────────────────────────────
text_sensor:
  - platform: madoka_ble
    firmware_version:
      name: "Firmware Version"

# ─── Number ─────────────────────────────────────────────────
number:
  - platform: madoka_ble
    eye_brightness:
      name: "Eye Brightness"

# ─── Buttons ────────────────────────────────────────────────
button:
  - platform: madoka_ble
    reset_filter:
      name: "Reset Filter"
  - platform: restart
    name: "Restart"
