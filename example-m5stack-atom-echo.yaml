# ─── Madoka BLE Bridge — M5Stack Atom Echo ──────────────────
#
# ESPHome firmware for M5Stack Atom Echo (ESP32-PICO) that
# connects to Daikin Madoka BRC1H via BLE and exposes
# ventilation control + sensors to Home Assistant.
#
# Note: This config uses the Atom Echo only as a BLE bridge.
#       Microphone and speaker are not used.
#
# Usage:
#   1. Copy this file to your ESPHome config directory
#   2. Set your secrets in secrets.yaml (see below)
#   3. Flash: esphome run madoka-bridge-atom.yaml
#
# Required secrets.yaml entries:
#   wifi_ssid: "YourWiFi"
#   wifi_password: "YourPassword"
#   api_encryption_key: "your-base64-key"   # generate with: esphome wizard
#   ota_password: "your-ota-password"
#   ap_password: "your-fallback-ap-password"
#   madoka_mac: "AA:BB:CC:DD:EE:FF"         # your BRC1H MAC address
# ────────────────────────────────────────────────────────────

esphome:
  name: madoka-bridge-atom
  friendly_name: "Madoka BLE Bridge (Atom Echo)"

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      # Enable BLE (classic ESP32 uses BTDM controller)
      CONFIG_BT_ENABLED: "y"
      CONFIG_BTDM_CTRL_MODE_BLE_ONLY: "y"
      CONFIG_BT_BLUEDROID_ENABLED: "y"
      CONFIG_BT_BLE_SMP_ENABLE: "y"
      # Enable LE Secure Connections (ESP32 supports BLE 4.2)
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: "y"
      # NVS for bond storage
      CONFIG_BT_BLE_STORE_BONDED_DEVICES: "y"

# Load component from GitHub
external_components:
  - source:
      type: git
      url: https://github.com/AppendinoCom/daikin-madoka-ventilation-mode
      ref: main
    components: [madoka_ble]

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Madoka-Bridge-Fallback"
    password: !secret ap_password

captive_portal:

# ─── Madoka BLE Component ───────────────────────────────────
madoka_ble:
  mac_address: !secret madoka_mac
  poll_interval: 60s

# ─── Sensors ────────────────────────────────────────────────
sensor:
  - platform: madoka_ble
    indoor_temperature:
      name: "Indoor Temperature"
    outdoor_temperature:
      name: "Outdoor Temperature"
    cooling_setpoint:
      name: "Cooling Setpoint"
    heating_setpoint:
      name: "Heating Setpoint"

# ─── Binary Sensors ─────────────────────────────────────────
binary_sensor:
  - platform: madoka_ble
    filter_alert:
      name: "Filter Alert"

# ─── Fan (ventilation on/off + low/high) ──────────────────
fan:
  - platform: madoka_ble
    id: rekuperacia_fan
    name: "Rekuperacia"

# ─── Text Sensors ───────────────────────────────────────────
text_sensor:
  - platform: madoka_ble
    firmware_version:
      name: "Firmware Version"

# ─── Number ─────────────────────────────────────────────────
number:
  - platform: madoka_ble
    eye_brightness:
      name: "Eye Brightness"

# ─── Buttons ────────────────────────────────────────────────
button:
  - platform: madoka_ble
    reset_filter:
      name: "Reset Filter"
  - platform: template
    name: "Rekuperacia Low"
    on_press:
      - lambda: |-
          auto call = id(rekuperacia_fan).turn_on();
          call.set_preset_mode("low");
          call.perform();
  - platform: template
    name: "Rekuperacia High"
    on_press:
      - lambda: |-
          auto call = id(rekuperacia_fan).turn_on();
          call.set_preset_mode("high");
          call.perform();
  - platform: restart
    name: "Restart"
